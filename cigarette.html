<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Minimal Quit | برنامه مینیمال ترک سیگار</title>
    <style>
        /* -------------------- RESET & BASE (مینیمال و مدرن) -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f4f8;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }

        /* کارت اصلی مینیمال - حذف سایه‌های سنگین و خطوط اضافه */
        .card {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid #eef2f5;
        }

        /* هدر مینیمال */
        .header {
            padding: 28px 28px 16px 28px;
            background: white;
            border-bottom: 1px solid #f0f2f5;
        }

        .badge-light {
            background: #f0f3f8;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 650;
            letter-spacing: -0.5px;
            color: #1a2c3e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .subhead {
            color: #5f6c7a;
            font-size: 0.85rem;
            font-weight: 400;
        }

        /* اطلاعات هفته و هدف روزانه */
        .info-strip {
            padding: 16px 28px;
            background: #fafcff;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid #eef2f5;
        }

        .week-chip {
            background: #eef2fa;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1f3b4c;
        }

        .daily-goal {
            font-size: 0.8rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 80px;
            padding: 5px 14px;
            color: #2c5f2d;
            font-weight: 500;
        }

        /* بخش پیشرفت ساده */
        .progress-area {
            padding: 18px 28px 12px 28px;
            background: white;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #4a5b6e;
            margin-bottom: 8px;
        }

        .progress-track {
            background: #eef2f6;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #2c7a4d;
            border-radius: 20px;
            transition: width 0.25s ease;
        }

        /* کارت محدودیت‌ها (مینیمال و شفاف) */
        .constraints-card {
            background: #ffffff;
            margin: 8px 24px 12px 24px;
            padding: 14px 20px;
            border-radius: 28px;
            border: 1px solid #eef2f8;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 8px 0;
            border-bottom: 1px dashed #ecf0f3;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .timer-minimal {
            background: #f8fafd;
            border-radius: 48px;
            padding: 14px 16px;
            text-align: center;
            margin-top: 16px;
            border: 1px solid #eef2f8;
        }

        .countdown-digit {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 1.9rem;
            font-weight: 600;
            color: #1e4663;
            letter-spacing: 2px;
        }

        .warning-toast {
            background: #fff6e8;
            margin: 8px 24px;
            padding: 12px 18px;
            border-radius: 28px;
            font-size: 0.8rem;
            border-right: 3px solid #e6a017;
            color: #8a6300;
        }

        /* دکمه مینیمال اما با تأکید */
        .btn-primary {
            display: block;
            width: calc(100% - 48px);
            margin: 16px auto 20px;
            background: #1e3b2c;
            border: none;
            padding: 16px 12px;
            font-size: 1.1rem;
            font-weight: 550;
            color: white;
            border-radius: 44px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 0.3px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: #0f2b1f;
        }

        .btn-primary:disabled {
            background: #bdc3ce;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        /* تاریخچه روز - مینیمال */
        .history-module {
            background: #ffffff;
            margin: 8px 24px 24px;
            border-radius: 28px;
            border: 1px solid #eff3f8;
            padding: 12px 8px 12px 12px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px 12px 12px;
            border-bottom: 1px solid #edf2f7;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .reset-link {
            background: none;
            border: none;
            color: #8b9eb0;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: underline;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
            padding: 8px 6px;
        }

        .empty-history {
            text-align: center;
            color: #9aaebf;
            font-size: 0.75rem;
            padding: 18px 8px;
        }

        .history-item {
            background: #fafdff;
            margin: 6px 0;
            padding: 8px 16px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            border: 1px solid #ecf3f9;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            padding: 20px 20px 24px;
            color: #98a9bc;
            border-top: 1px solid #eff2f8;
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .btn-primary { font-size: 1rem; }
            .countdown-digit { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="badge-light">🚭 ۴ هفته · کاهش هوشمند</div>
        <h1>نفس تازه <span style="font-weight: 400;"></span></h1>
        <div class="subhead"></div>
    </div>

    <div class="info-strip">
        <div class="week-chip" id="weekDisplay">هفته ۱</div>
        <div class="daily-goal" id="dailyLimitDisplay">حداکثر امروز: ۱۵ نخ</div>
    </div>

    <div class="progress-area">
        <div class="progress-label">
            <span>🚬 سیگارهای امروز</span>
            <span><span id="smokedCounter">۰</span> / <span id="maxCounter">۱۵</span></span>
        </div>
        <div class="progress-track">
            <div class="progress-bar" id="progressFill" style="width: 0%;"></div>
        </div>
    </div>

    <div class="constraints-card">
        <div class="info-row">
            <span>🕒 آخرین سیگار:</span>
            <strong id="lastSmokeTime">--:--</strong>
        </div>
        <div class="info-row">
            <span>⏱️ حداقل فاصله لازم (طبق هفته):</span>
            <strong id="requiredGapMinutes">۶۰ دقیقه</strong>
        </div>
        <div class="timer-minimal">
            <div style="font-size: 0.7rem; margin-bottom: 6px;">زمان مجاز برای سیگار بعدی</div>
            <div class="countdown-digit" id="countdownTimer">اکنون می‌توانی</div>
        </div>
    </div>

    <div id="warningMsg" class="warning-toast" style="display: none;"></div>

    <button id="logSmokeBtn" class="btn-primary">🚬 ثبت سیگار کشیدم</button>

    <div class="history-module">
        <div class="history-header">
            <span>📋 امروز</span>
            <button id="resetDayBtn" class="reset-link">بازنشانی امروز</button>
        </div>
        <div id="historyListContainer" class="history-list">
            <div class="empty-history">هنوز سیگاری ثبت نشده</div>
        </div>
    </div>
    <footer>
        قوانین پویا · هفته ۱ (۱۵ نخ/روز ، حداقل ۱ ساعت فاصله) · کاهش پیشرونده
    </footer>
</div>

<script>
    // --------------------------------------------------------------
    // برنامه کاهش مینیمال - 4 هفته
    // هفته 1: max=15 , gap= 60 دقیقه
    // هفته 2: max=9  , gap= 90 دقیقه
    // هفته 3: max=4  , gap= 180 دقیقه (3 ساعت)
    // هفته 4: max=1  , gap= 360 دقیقه (6 ساعت)
    // --------------------------------------------------------------
    const PLAN = {
        week1: { maxPerDay: 15, gapMinutes: 60 },
        week2: { maxPerDay: 9,  gapMinutes: 90 },
        week3: { maxPerDay: 4,  gapMinutes: 180 },
        week4: { maxPerDay: 1,  gapMinutes: 360 }
    };

    // LocalStorage کلید
    const STORAGE_KEY = "MinimalQuitApp";
    let appState = {
        startDate: null,      // تاریخ شروع YYYY-MM-DD
        smokeLogs: []         // آرایه از { timestamp: number }
    };

    // متغیرهای وضعیت
    let currentWeek = 1;
    let todayMax = 15;
    let requiredGapMs = 60 * 60 * 1000;  // 1 ساعت
    let todaySmokedCount = 0;
    let lastSmokeTimeMs = null;

    // تایمر شمارش معکوس - یک نمونه global
    let countdownIntervalId = null;

    // عناصر DOM
    const weekDisplaySpan = document.getElementById("weekDisplay");
    const dailyLimitDisplaySpan = document.getElementById("dailyLimitDisplay");
    const smokedCounterSpan = document.getElementById("smokedCounter");
    const maxCounterSpan = document.getElementById("maxCounter");
    const progressFillDiv = document.getElementById("progressFill");
    const lastSmokeTimeSpan = document.getElementById("lastSmokeTime");
    const requiredGapMinutesSpan = document.getElementById("requiredGapMinutes");
    const countdownTimerDiv = document.getElementById("countdownTimer");
    const warningMsgDiv = document.getElementById("warningMsg");
    const logSmokeBtn = document.getElementById("logSmokeBtn");
    const resetDayBtn = document.getElementById("resetDayBtn");
    const historyListContainer = document.getElementById("historyListContainer");

    // ------------------- توابع کمکی تاریخ -------------------
    function getTodayDateStr() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }

    // شروع برنامه (اگر startDate نبود امروز قرار بده)
    function initStartDate() {
        if (!appState.startDate) {
            appState.startDate = getTodayDateStr();
            saveState();
        }
        return appState.startDate;
    }

    // محاسبه هفته جاری بر اساس روز شروع (هر 7 روز یک هفته)
    function calculateCurrentWeek() {
        if (!appState.startDate) return 1;
        const start = new Date(appState.startDate);
        start.setHours(0,0,0,0);
        const today = new Date();
        today.setHours(0,0,0,0);
        const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return 1;
        if (diffDays < 7) return 1;
        if (diffDays < 14) return 2;
        if (diffDays < 21) return 3;
        return 4;
    }

    // گرفتن تنظیمات هفته
    function getPlanByWeek(week) {
        if (week === 1) return PLAN.week1;
        if (week === 2) return PLAN.week2;
        if (week === 3) return PLAN.week3;
        return PLAN.week4;
    }

    // به روز رسانی محدودیت‌ها بر اساس هفته
    function updateLimitsBasedOnWeek() {
        const newWeek = calculateCurrentWeek();
        currentWeek = newWeek;
        const plan = getPlanByWeek(currentWeek);
        todayMax = plan.maxPerDay;
        requiredGapMs = plan.gapMinutes * 60 * 1000;

        // نمایش در UI
        weekDisplaySpan.innerText = `هفته ${currentWeek}`;
        dailyLimitDisplaySpan.innerText = `حداکثر امروز: ${todayMax} نخ`;
        maxCounterSpan.innerText = todayMax;
        requiredGapMinutesSpan.innerText = `${plan.gapMinutes} دقیقه`;
    }

    // گرفتن لاگ‌های امروز
    function getTodayLogs() {
        const todayStr = getTodayDateStr();
        const todayStart = new Date(todayStr + "T00:00:00").getTime();
        const tomorrowStart = todayStart + 86400000;
        return appState.smokeLogs.filter(log => log.timestamp >= todayStart && log.timestamp < tomorrowStart);
    }

    // بروزرسانی آمار روز (تعداد، آخرین زمان، پیشرفت)
    function refreshDailyStats() {
        const todayLogs = getTodayLogs();
        todaySmokedCount = todayLogs.length;
        smokedCounterSpan.innerText = todaySmokedCount;
        const percent = (todaySmokedCount / todayMax) * 100;
        progressFillDiv.style.width = `${Math.min(percent, 100)}%`;

        if (todayLogs.length > 0) {
            const lastLog = todayLogs[todayLogs.length - 1];
            lastSmokeTimeMs = lastLog.timestamp;
            const lastDate = new Date(lastLog.timestamp);
            lastSmokeTimeSpan.innerText = `${lastDate.getHours().toString().padStart(2,'0')}:${lastDate.getMinutes().toString().padStart(2,'0')}:${lastDate.getSeconds().toString().padStart(2,'0')}`;
        } else {
            lastSmokeTimeMs = null;
            lastSmokeTimeSpan.innerText = "--:--";
        }
        renderHistory();
        // بعد از تغییر آمار، تایمر و وضعیت دکمه را بروز کن
        updateCountdownAndButton();
    }

    // تابع اصلی: نمایش همیشه شمارش معکوس بدون نوسان بین متن‌های مختلف (فقط پیام مجاز / زمان باقی)
    function updateCountdownAndButton() {
        // اول بررسی محدودیت تعداد روزانه
        if (todaySmokedCount >= todayMax) {
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            countdownTimerDiv.innerText = "❌ به حد مجاز روزانه رسیدی";
            logSmokeBtn.disabled = true;
            return;
        }

        // اگر اصلاً سیگاری نزده‌ایم => مجاز کامل
        if (lastSmokeTimeMs === null) {
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            countdownTimerDiv.innerText = "✅ آماده ثبت سیگار";
            logSmokeBtn.disabled = false;
            return;
        }

        // بررسی فاصله زمانی
        const now = Date.now();
        const elapsed = now - lastSmokeTimeMs;
        if (elapsed >= requiredGapMs) {
            // زمان مجاز رسیده
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            countdownTimerDiv.innerText = "✅ اکنون می‌توانی سیگار بکشی";
            logSmokeBtn.disabled = false;
            return;
        } else {
            // در حالت انتظار: شمارش معکوس را نشان بده (بدون جابجایی)
            logSmokeBtn.disabled = true;
            // اگر تایمر فعال نیست، راه بینداز
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            countdownIntervalId = setInterval(() => {
                // اینجا همیشه یک تایمر زنده می‌ماند تا لحظه اتمام فاصله را بگیرد
                const now2 = Date.now();
                const elapsed2 = now2 - lastSmokeTimeMs;
                if (elapsed2 >= requiredGapMs) {
                    // شرط مجاز شدن
                    if (countdownIntervalId) clearInterval(countdownIntervalId);
                    countdownTimerDiv.innerText = "✅ اکنون می‌توانی سیگار بکشی";
                    logSmokeBtn.disabled = false;
                    // در صورتی که دکمه غیرفعال بود فعالش کن
                } else {
                    const remainMs = requiredGapMs - elapsed2;
                    const minutesLeft = Math.floor(remainMs / 60000);
                    const secondsLeft = Math.floor((remainMs % 60000) / 1000);
                    countdownTimerDiv.innerText = `${minutesLeft}:${secondsLeft.toString().padStart(2,'0')} دقیقه باقی‌مانده`;
                }
            }, 300);
            // مقداردهی اولیه نمایش
            const remainMsFirst = requiredGapMs - elapsed;
            const minFirst = Math.floor(remainMsFirst / 60000);
            const secFirst = Math.floor((remainMsFirst % 60000) / 1000);
            countdownTimerDiv.innerText = `${minFirst}:${secFirst.toString().padStart(2,'0')} دقیقه باقی‌مانده`;
            return;
        }
    }

    // بررسی امکان ثبت سیگار (برای نمایش هشدار در صورت کلیک)
    function canSmokeNowWithReason() {
        if (todaySmokedCount >= todayMax) {
            return { allowed: false, reason: `❌ امروز به حداکثر ${todayMax} نخ رسیده‌اید. فردا دوباره تلاش کن!` };
        }
        if (lastSmokeTimeMs !== null) {
            const now = Date.now();
            const elapsed = now - lastSmokeTimeMs;
            if (elapsed < requiredGapMs) {
                const remainMin = Math.ceil((requiredGapMs - elapsed) / (60 * 1000));
                const remainSec = Math.ceil((requiredGapMs - elapsed) / 1000) % 60;
                return { allowed: false, reason: `⏰ زودتر از موعد! باید حداقل ${Math.floor(requiredGapMs/60000)} دقیقه بین سیگارها فاصله باشد. زمان باقی: ${remainMin} دقیقه و ${remainSec} ثانیه` };
            }
        }
        return { allowed: true, reason: "" };
    }

    // ثبت سیگار جدید
    function logSmokeHandler() {
        const check = canSmokeNowWithReason();
        if (!check.allowed) {
            warningMsgDiv.style.display = "block";
            warningMsgDiv.innerHTML = `⚠️ ${check.reason}`;
            setTimeout(() => {
                if (warningMsgDiv) warningMsgDiv.style.display = "none";
            }, 4000);
            return;
        }
        // ذخیره سیگار جدید
        const newLog = { timestamp: Date.now() };
        appState.smokeLogs.push(newLog);
        saveState();
        // پس از ذخیره، آمار را به روز کن
        refreshDailyStats();      // این تابع داخلش updateCountdownAndButton را صدا می‌زند

        // پیام موفقیت غیر مزاحم
        const toast = document.createElement("div");
        toast.innerText = "✓ سیگار ثبت شد. پایبند باش!";
        toast.style.position = "fixed";
        toast.style.bottom = "20px";
        toast.style.left = "20px";
        toast.style.right = "20px";
        toast.style.backgroundColor = "#1e3b2c";
        toast.style.color = "white";
        toast.style.padding = "12px";
        toast.style.borderRadius = "60px";
        toast.style.textAlign = "center";
        toast.style.fontSize = "0.85rem";
        toast.style.zIndex = "999";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
        warningMsgDiv.style.display = "none";
    }

    // رندر تاریخچه امروز
    function renderHistory() {
        const todayLogs = getTodayLogs();
        if (todayLogs.length === 0) {
            historyListContainer.innerHTML = `<div class="empty-history">✨ هیچ سیگاری ثبت نشده، عالی!</div>`;
            return;
        }
        let html = "";
        // نمایش از جدید به قدیم (برعکس)
        todayLogs.slice().reverse().forEach(log => {
            const d = new Date(log.timestamp);
            const timeStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
            html += `<div class="history-item">
                        <span>🚬 سیگار</span>
                        <span>⏱️ ${timeStr}</span>
                     </div>`;
        });
        historyListContainer.innerHTML = html;
    }

    // بازنشانی امروز (حذف لاگ‌های امروز)
    function resetTodayLogs() {
        const todayStr = getTodayDateStr();
        const todayStart = new Date(todayStr + "T00:00:00").getTime();
        const tomorrowStart = todayStart + 86400000;
        const filteredLogs = appState.smokeLogs.filter(log => log.timestamp < todayStart || log.timestamp >= tomorrowStart);
        appState.smokeLogs = filteredLogs;
        saveState();
        refreshDailyStats();
        // پاک کردن هشدار
        warningMsgDiv.style.display = "none";
        const msg = document.createElement("div");
        msg.innerText = "🔄 سیگارهای امروز بازنشانی شد. فرصتی دوباره برای پایبندی";
        msg.style.position = "fixed";
        msg.style.bottom = "20px";
        msg.style.left = "20px";
        msg.style.right = "20px";
        msg.style.backgroundColor = "#e9ecef";
        msg.style.color = "#2c3e50";
        msg.style.padding = "10px";
        msg.style.borderRadius = "50px";
        msg.style.textAlign = "center";
        msg.style.fontSize = "0.8rem";
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 2000);
    }

    // ذخیره در localStorage
    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    }

    function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                const parsed = JSON.parse(raw);
                if (parsed.startDate && parsed.smokeLogs !== undefined) {
                    appState = parsed;
                } else {
                    initDefaultState();
                }
            } catch (e) {
                initDefaultState();
            }
        } else {
            initDefaultState();
        }
        if (!appState.startDate) appState.startDate = getTodayDateStr();
        // حذف لاگ‌های آینده (احتمالی خطا)
        const nowMs = Date.now();
        appState.smokeLogs = appState.smokeLogs.filter(l => l.timestamp <= nowMs + 5000);
        saveState();
    }

    function initDefaultState() {
        appState = {
            startDate: getTodayDateStr(),
            smokeLogs: []
        };
        saveState();
    }

    // تابع periodic برای تغییر روز و هفته (بدون نیاز به رفرش صفحه)
    function startAutoSync() {
        setInterval(() => {
            // بررسی تغییر روز و هفته
            const oldWeek = currentWeek;
            updateLimitsBasedOnWeek();
            refreshDailyStats();   // دوباره آمار را می‌گیرد و تایمر را درست می‌کند
            if (oldWeek !== currentWeek) {
                // اگر هفته تغییر کرد، هشدار خفیف با پیام
                const plan = getPlanByWeek(currentWeek);
                const notif = document.createElement("div");
                notif.innerText = `📆 هفته ${currentWeek} شروع شد | حداکثر روزانه: ${plan.maxPerDay} نخ ، فاصله: ${plan.gapMinutes} دقیقه`;
                notif.style.position = "fixed";
                notif.style.top = "12px";
                notif.style.left = "12px";
                notif.style.right = "12px";
                notif.style.backgroundColor = "#1e3b2c";
                notif.style.color = "white";
                notif.style.borderRadius = "30px";
                notif.style.padding = "12px";
                notif.style.fontSize = "0.8rem";
                notif.style.textAlign = "center";
                notif.style.zIndex = "1000";
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 3000);
            }
        }, 30000); // هر 30 ثانیه بررسی کافیست
    }

    // اتصال رویدادها
    function bindEvents() {
        logSmokeBtn.addEventListener("click", logSmokeHandler);
        resetDayBtn.addEventListener("click", resetTodayLogs);
    }

    // مقداردهی اولیه
    function init() {
        loadState();
        bindEvents();
        updateLimitsBasedOnWeek();
        refreshDailyStats();
        startAutoSync();
        // همچنین اطمینان از اینکه هنگام بازگشت به تب focus دوباره تایمر درست کار کند
        window.addEventListener("focus", () => {
            refreshDailyStats();
        });
    }

    init();
</script>
</body>
</html>
